# ==========================================================
#  LessLag Configuration File
# ==========================================================
#  This plugin reduces server/client lag with several
#  performance features. Each section can be toggled and tuned.
#
#  Every feature below is implemented and works ([OK]). The old broken /
#  fake / unimplemented features (smart_entity_removal, mob_ai, chunk_loading,
#  web_interface, lag_reports, task_profiler, performance_history) have been
#  removed from both the code and this file.
#
#  Reactive threshold note:
#    Every "disable_below_tps" now reacts to SHORT LAG SPIKES, not just
#    sustained lag. Internally the trigger fires when EITHER the
#    instantaneous MSPT-based TPS OR the 1-minute average drops below the
#    threshold. Set a value >20 to make that feature effectively always-on.
# ==========================================================

# Permissions:
# - lesslag.admin (main permission for the /lesslag command and admin notices)

settings:
  # Prefix for all chat messages sent by the plugin
  prefix: "§7[§cLessLag§7] §r"
  # How often (in ticks) periodic checks run. 20 ticks = 1 second.
  tps_check_interval: 20

  # General "server is under load" threshold used by some features.
  low_tps_threshold: 15.0

  # Critical threshold. Drastic, hard-to-reverse actions (world
  # force-unload + player transfer) use the SUSTAINED 1-minute average at
  # this value on purpose, so a momentary spike can't teleport everyone.
  critical_tps_threshold: 10.0

# ----------------------------------------------------------
# World management
# ----------------------------------------------------------
world_management:
  auto_unload:                       # [OK] unload empty, inactive worlds
    enabled: true
    # Whether to save worlds before unloading them
    save_world: true
    # Minutes with no players in a world before it gets unloaded
    inactivity_minutes: 5
    # Worlds that should never be auto-unloaded
    excluded_worlds:
      - world
      - lobby

  force_unload_on_low_tps:           # [OK] emergency world unload
    # Drastic: teleports players out and unloads worlds. Fires only on
    # SUSTAINED low TPS (critical_tps_threshold), never on a single spike.
    # Leave OFF unless you understand the impact.
    enabled: false
    player_transfer_world: world

# ----------------------------------------------------------
# Item management
# ----------------------------------------------------------
item_management:
  drop_timer:                        # [OK] per-item countdown despawn
    # Give each dropped item its OWN visible countdown, then remove it when
    # the timer runs out — instead of wiping every drop at once on a fixed
    # interval (that's auto_clear_drops below, off by default). Drop a block
    # of dirt and it shows e.g. "Dirt x64 (30s)" ticking down to 0.
    # Uses the entity's own age, so the timer survives restart/reload.
    enabled: true
    # Seconds a dropped item lives before it is removed.
    despawn_seconds: 30
    # Append the live countdown to the item's hologram.
    show_in_hologram: true
    # Only show the ticking countdown in the FINAL N seconds before despawn.
    # Before that the hologram is static ("Dirt x64"); in the last N seconds
    # the number appears and counts down as an about-to-expire warning. This
    # avoids repainting every item's hologram every second. Set >=
    # despawn_seconds to always show the countdown.
    countdown_seconds: 10
    # How that final-seconds countdown is rendered, appended after the item
    # name. Bold + RED by default (&c = red, &l = bold) so it clearly stands
    # out from the item name instead of blending in -- e.g. "Dirt x64 [7s]"
    # with the "[7s]" in bold red. Supports & colour codes; {seconds} is the
    # live number. NOTE: Minecraft nametags have no font-size control, so BOLD
    # is the largest/heaviest emphasis text can be given.
    countdown_format: "&c&l[{seconds}s]"
    # Items that never expire (stay on the ground forever).
    whitelist:
      - diamond
      - nether_star

  hologram:                          # [OK] hologram load protection
    enabled: true
    # Above this many item entities in a world, refresh holograms only every
    # few seconds instead of every second (cuts entity-metadata packet spam
    # while mining or at a busy farm).
    throttle_above: 150
    throttled_refresh_seconds: 5
    # Above this many item entities in a world, hide item holograms entirely.
    hide_above: 400

  auto_clear_drops:                  # periodic ground-item wipe (legacy)
    # Off by default — drop_timer above is the recommended replacement. If
    # you enable this too, it will still bulk-clear every drop on the
    # interval in addition to the per-item timer.
    enabled: false
    # How often (seconds) all non-whitelisted dropped items are cleared.
    interval_seconds: 240
    # Items that are never auto-cleared
    whitelist:
      - diamond
      - nether_star

  item_stacking:                     # [OK] merges ground items into 1 entity
    # Self-limiting under load: the more items drop, the more they merge,
    # so the item-ENTITY count (and this feature's own cost) stays low.
    # Stacked amounts now persist across restart/reload (stored on the item
    # entity), so a "x2000" ground stack keeps its count.
    #
    # Merging is grid-based: every item is bucketed once into a spatial cell,
    # then merged within its cell -- ONE O(N) pass per second, with NO per-item
    # neighbour scan. This is what keeps a huge TNT blast / mob-farm dump from
    # making the merge itself the lag spike (the old per-item nearby-entity
    # scan was O(N^2) on big drops).
    enabled: true
    # Items dropped within this radius merge together (also sets the merge grid
    # cell size, so a bigger radius = fewer, larger cells).
    stack_radius: 3.0
    # Hologram text shown above stacked items. Placeholders:
    #   {item_type} = type (e.g. "Diamond")
    #   {item_name} = custom name if renamed, else same as {item_type}
    #   {amount}    = total amount in the stack
    # The drop_timer countdown (if enabled) is appended automatically.
    hologram_format: "§e{item_name}§f x{amount}"
    # "partial" = pick up only what fits; "full" = take the whole stack only if
    # it ALL fits. In "full" mode, a full inventory that still has room in an
    # existing partial stack of the same item will top that off (like vanilla)
    # rather than rejecting the pickup outright.
    pickup_behavior: "partial"

  water_stacking:                    # [OK] collapse bubble-column / water items
    # Items caught in a bubble column (soul sand pushes them up, magma pulls
    # them down) or in flowing water get shot up and fall over and over, so they
    # oscillate across many blocks and keep sending move packets. Because they're
    # spread out VERTICALLY they often sit just outside the normal stack window
    # and never merge -- a soul-sand item elevator or a drop chute over water can
    # leave dozens of separate, constantly-moving item entities = "massive lag".
    # This reaches further UP/DOWN when merging items that are in water, so the
    # whole column collapses into one stacked entity. Horizontal reach is
    # unchanged, so it won't over-merge a wide area. It only ever MERGES
    # (amounts are preserved exactly like normal stacking) -- it never deletes.
    #
    # Requires item_stacking.enabled above (this extends stacking). If stacking
    # is off, this does nothing.
    enabled: true
    # Only engage once MORE than this many water item entities remain AFTER the
    # normal per-cell merge above -- so a short column that already collapsed to
    # a couple of entities keeps vanilla behaviour. Keep this low: the normal
    # merge already thins a column down a lot, so a high value here would stop
    # this pass from ever running. This extra pass runs only on the surviving
    # entities, so its cost scales with what's left, never with the raw drop.
    min_items: 4
    # Vertical height (blocks) of the water merge cell -- how far up/down items
    # in the same column combine. Tall enough to swallow a typical bubble-column
    # elevator; horizontal reach stays at item_stacking.stack_radius.
    vertical_radius: 12.0

# ----------------------------------------------------------
# Entity management (soft-cap)
# ----------------------------------------------------------
entity_management:
  # [OK] Soft-cap. Runs every 10s (not per-event), so cost is independent
  # of spawn rate. Recommended mode: PAUSE spawning over the limit rather
  # than deleting, so farms are never wiped.
  max_entities_per_chunk: 50
  max_entities_per_world: 5000
  # When a world has this many MOBS, pause natural spawning there until the
  # count drops. Only living mobs count toward this gate -- dropped items, XP
  # orbs, armor stands, item frames, boats, etc. do NOT -- so a busy farm's
  # output can't switch off spawning for the whole world and starve farms.
  disable_natural_spawn_on_limit: true
  # Kill entities above the limit. Default OFF: pausing spawns (above) is
  # safe, but killing can destroy farm mobs/drops. Turn on only if you
  # accept that trade-off.
  kill_excess_entities: false

  breedable_global_limits:           # [OK] server-wide caps for FARM mobs only
    # Global per-type population caps for breedable / farm mobs. Above a type's
    # limit, further BREEDING and egg-hatching of THAT type is paused across the
    # whole server until the population drops -- existing mobs are NEVER killed
    # (pause-don't-wipe). Hostile mobs are never affected: they don't spawn from
    # breeding/eggs, and only the types you list here are capped. Counts are of
    # LOADED entities and refresh every ~10s, so a type may sit slightly over
    # its cap between refreshes (harmless -- breeding cooldowns are slow).
    enabled: true
    limits:
      villager: 500
      cow: 100
      sheep: 100
      pig: 100
      chicken: 100
      rabbit: 100
      mooshroom: 50
      goat: 50
      horse: 50
      donkey: 50
      llama: 50
      fox: 50
      cat: 50
      wolf: 100
      bee: 100
      turtle: 50
      frog: 50
      # Add any breedable mob by its Bukkit type name (lowercase). Types not
      # listed here are never capped.

# ----------------------------------------------------------
# Player management
# ----------------------------------------------------------
player_management:
  # [OK] Cap players per world; overflow is sent to the fallback world.
  max_players_per_world: 50
  fallback_world: world

  packet_spam_protection:            # [OK] anti-crash packet limiter
    enabled: true
    packet_limit: 1000
    # "kick" or "ban"
    action: "kick"
    action_reason: "§cYou're sending way too many packets! Trying to crash the server!?"

  chat_spam_protection:              # [OK]
    enabled: true
    max_messages_per_second: 6
    mute_duration_seconds: 5

# ----------------------------------------------------------
# Reactive performance controls (all spike-aware now)
# ----------------------------------------------------------
# Each listener below is only registered when its "enabled" is true, and the
# in-event work is near-zero until the server is actually lagging, so these
# stay cheap even with big farms / redstone / lava builds.
performance_controls:
  disable_redstone:                  # [OK]
    enabled: true
    # NOTE: currently NOT honored. Below the threshold ALL redstone is
    # disabled regardless of this value; kept false to match real behavior.
    clocks_only: false
    disable_below_tps: 12.0

  disable_falling_blocks:            # [OK] holds sand/gravel/concrete powder
    enabled: true
    disable_below_tps: 12.0

  disable_fluids:                    # [OK] freezes water/lava flow
    enabled: true
    disable_below_tps: 12.0

  disable_explosions:                # [OK] cancels explosions during lag
    enabled: true
    disable_below_tps: 10.0

  disable_ender_pearls:              # [OK]
    enabled: true
    disable_below_tps: 10.0

  disable_command_blocks:            # [OK]
    enabled: true
    disable_below_tps: 10.0

  decrease_tickspeed:                # [OK] lowers random tick speed under lag
    enabled: true
    decrease_below_tps: 15.0
    # Value to drop random tick speed to (vanilla: 3, most performant: 0)
    decrease_to: 0

# ----------------------------------------------------------
# Villager optimization  ->  [OK] targets packed breeders / trading halls
# ----------------------------------------------------------
# The classic "why is my server lagging" build: a pen with 10+ villagers all
# colliding, all running AI, forever jumping against the water/walls. This
# module has three INDEPENDENT levers -- each can be tuned or turned off on its
# own. All periodic work runs on a timer (not per-tick, not per-mob), so its
# cost does not grow with villager count, and state is only written when it
# changes (no redundant packets).
villager_optimization:
  enabled: true
  # How often (in ticks) the collision/AI scan runs. 20 ticks = 1 second.
  # Clamped to a 20-tick minimum in code. Higher = cheaper, slightly less
  # responsive when players walk up to a hall.
  check_interval_ticks: 100

  # Entity push/collision is the DOMINANT cost in a packed pen -- it grows with
  # the square of the villager count (everyone shoves everyone). Once a chunk
  # holds MORE than this many villagers, their collision is switched off: they
  # still breed, trade and restock, they just stop pushing each other. This is
  # the single biggest win and has essentially no downside for a breeder.
  # Set to 0 to disable this lever (villagers keep vanilla collision).
  disable_collision_above_per_chunk: 6

  # Villager AI (pathfinding + the water/wall-jumping loop) is the other big
  # cost. Instead of HARD-FREEZING it when nobody's around -- which leaves
  # villagers standing dead-still and looks like a broken/lagging server --
  # this THROTTLES it: while no player is within `radius`, each villager's AI
  # goals run only a fraction of ticks, so they still wander and turn (just
  # sluggishly, like normal idling) while shedding most of the AI cost. The
  # cycle is phase-staggered per villager, so a pen never freezes in unison --
  # at any moment part of the herd is moving. Full-speed AI resumes when a
  # player comes near.
  # NOTE: this slows (does not stop) villager-driven farms (e.g. iron farms)
  # while no player is within the radius. If you run AFK villager farms, raise
  # the radius past your AFK spot, push efficiency_percent to 100, or disable.
  throttle_ai_when_no_players_nearby:
    enabled: true
    radius: 24
    # AI "efficiency" while no player is near, as a percentage (1-100). 30 =
    # AI goals run ~30% as often (~70% of the AI cost saved) while villagers
    # still visibly move. 100 = no throttling; lower = cheaper but more
    # sluggish/noticeable. Never fully freezes: at least 1 tick of AI per
    # cycle always runs.
    efficiency_percent: 30
    # Length of the on/off cycle in ticks (20 = 1s). The "on" window is
    # efficiency_percent of this. Smaller = smoother movement, more toggles;
    # larger = fewer toggles, choppier idling.
    cycle_ticks: 20

  # Stop a breeder from growing without bound. Above this many villagers in a
  # chunk, new BREEDING is cancelled (trades, restock and existing villagers
  # are untouched -- villagers are NEVER killed, matching the plugin's
  # pause-don't-wipe policy). Set to 0 to allow unlimited breeding.
  max_per_chunk: 20

# ----------------------------------------------------------
# In-game profiler bossbar (/lesslag profiler)  ->  [OK]
# ----------------------------------------------------------
profiler:
  enabled: true
  update_interval_ticks: 20
  show_cpu_usage: true
  show_ram_usage: true
  # Counts packets via ProtocolLib. Shown only to bossbar viewers.
  show_packets: true

# ----------------------------------------------------------
# Explosion queue  ->  [OK] spreads explosions across ticks
# ----------------------------------------------------------
explosion_queue:
  enabled: true
  explosions_per_tick: 5
  # Low TPS = fewer explosions per tick, and vice versa.
  dynamic_scaling: true
  low_tps_only:
    # When true, only queue while lagging (uses the spike-aware signal).
    enabled: true
    tps_below: 15.0
  queue_types:
    tnt: true
    creeper: true
    end_crystal: false
    bed: true
    respawn_anchor: true
    ghast_fireball: false
    wither_skull: false
  bypass_worlds:
    - pvp_world
    - practice
  limits:
    max_queue_size: 500
    cancel_new_explosions_when_full: true
