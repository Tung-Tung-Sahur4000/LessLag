# ==========================================================
#  LessLag Configuration File
# ==========================================================
#  This plugin reduces server/client lag with several
#  performance features. Each section can be toggled and tuned.
#
#  LEGEND (status of each feature, from the code audit):
#    [OK]        Works as intended, safe to run.
#    [OFF]       Disabled at the PLUGIN level regardless of this file
#                (the code was broken/destructive). The toggle is kept
#                only so the file stays stable; flipping it does nothing.
#    [TODO]      Config exists but NO code reads it yet — has no effect.
#
#  Reactive threshold note:
#    Every "disable_below_tps" now reacts to SHORT LAG SPIKES, not just
#    sustained lag. Internally the trigger fires when EITHER the
#    instantaneous MSPT-based TPS OR the 1-minute average drops below the
#    threshold. Set a value >20 to make that feature effectively always-on.
# ==========================================================

# Permissions:
# - lesslag.admin (main permission for the /lesslag command and admin notices)

settings:
  # Prefix for all chat messages sent by the plugin
  prefix: "§7[§cLessLag§7] §r"
  # How often (in ticks) periodic checks run. 20 ticks = 1 second.
  tps_check_interval: 20

  # General "server is under load" threshold used by some features.
  low_tps_threshold: 15.0

  # Critical threshold. Drastic, hard-to-reverse actions (world
  # force-unload + player transfer) use the SUSTAINED 1-minute average at
  # this value on purpose, so a momentary spike can't teleport everyone.
  critical_tps_threshold: 10.0

# ----------------------------------------------------------
# World management
# ----------------------------------------------------------
world_management:
  auto_unload:                       # [OK] unload empty, inactive worlds
    enabled: true
    # Whether to save worlds before unloading them
    save_world: true
    # Minutes with no players in a world before it gets unloaded
    inactivity_minutes: 5
    # Worlds that should never be auto-unloaded
    excluded_worlds:
      - world
      - lobby

  force_unload_on_low_tps:           # [OK] emergency world unload
    # Drastic: teleports players out and unloads worlds. Fires only on
    # SUSTAINED low TPS (critical_tps_threshold), never on a single spike.
    # Leave OFF unless you understand the impact.
    enabled: false
    player_transfer_world: world

# ----------------------------------------------------------
# Item management
# ----------------------------------------------------------
item_management:
  drop_timer:                        # [OK] per-item countdown despawn
    # Give each dropped item its OWN visible countdown, then remove it when
    # the timer runs out — instead of wiping every drop at once on a fixed
    # interval (that's auto_clear_drops below, off by default). Drop a block
    # of dirt and it shows e.g. "Dirt x64 (30s)" ticking down to 0.
    # Uses the entity's own age, so the timer survives restart/reload.
    enabled: true
    # Seconds a dropped item lives before it is removed.
    despawn_seconds: 30
    # Append the live countdown to the item's hologram.
    show_in_hologram: true
    # Only show the ticking countdown in the FINAL N seconds before despawn.
    # Before that the hologram is static ("Dirt x64"); in the last N seconds
    # the number appears and counts down ("Dirt x64 (10s)") as an
    # about-to-expire warning. This avoids repainting every item's hologram
    # every second. Set >= despawn_seconds to always show the countdown.
    countdown_seconds: 10
    # Items that never expire (stay on the ground forever).
    whitelist:
      - diamond
      - nether_star

  hologram:                          # [OK] hologram load protection
    enabled: true
    # Above this many item entities in a world, refresh holograms only every
    # few seconds instead of every second (cuts entity-metadata packet spam
    # while mining or at a busy farm).
    throttle_above: 150
    throttled_refresh_seconds: 5
    # Above this many item entities in a world, hide item holograms entirely.
    hide_above: 400

  auto_clear_drops:                  # periodic ground-item wipe (legacy)
    # Off by default — drop_timer above is the recommended replacement. If
    # you enable this too, it will still bulk-clear every drop on the
    # interval in addition to the per-item timer.
    enabled: false
    # How often (seconds) all non-whitelisted dropped items are cleared.
    interval_seconds: 240
    # Items that are never auto-cleared
    whitelist:
      - diamond
      - nether_star

  item_stacking:                     # [OK] merges ground items into 1 entity
    # Self-limiting under load: the more items drop, the more they merge,
    # so the item-ENTITY count (and this feature's own cost) stays low.
    # Stacked amounts now persist across restart/reload (stored on the item
    # entity), so a "x2000" ground stack keeps its count.
    enabled: true
    # Items dropped within this radius merge together.
    stack_radius: 3.0
    # Hologram text shown above stacked items. Placeholders:
    #   {item_type} = type (e.g. "Diamond")
    #   {item_name} = custom name if renamed, else same as {item_type}
    #   {amount}    = total amount in the stack
    # The drop_timer countdown (if enabled) is appended automatically.
    hologram_format: "§e{item_name}§f x{amount}"
    # "partial" = pick up only what fits; "full" = all-or-nothing.
    pickup_behavior: "partial"

# ----------------------------------------------------------
# Entity management (soft-cap)
# ----------------------------------------------------------
entity_management:
  # [OK] Soft-cap. Runs every 10s (not per-event), so cost is independent
  # of spawn rate. Recommended mode: PAUSE spawning over the limit rather
  # than deleting, so farms are never wiped.
  max_entities_per_chunk: 50
  max_entities_per_world: 5000
  # When a world has this many MOBS, pause natural spawning there until the
  # count drops. Only living mobs count toward this gate -- dropped items, XP
  # orbs, armor stands, item frames, boats, etc. do NOT -- so a busy farm's
  # output can't switch off spawning for the whole world and starve farms.
  disable_natural_spawn_on_limit: true
  # Kill entities above the limit. Default OFF: pausing spawns (above) is
  # safe, but killing can destroy farm mobs/drops. Turn on only if you
  # accept that trade-off.
  kill_excess_entities: false

  smart_entity_removal:              # [OFF] mass-deleted farms, disabled in code
    # The original logic deleted every entity of the most common type across
    # ALL worlds every 5 min with no TPS/overpopulation check. Hard-disabled
    # at the plugin level; this toggle has no effect.
    enabled: false
    whitelist:
      - villager
      - wolf
      - item

# ----------------------------------------------------------
# Player management
# ----------------------------------------------------------
player_management:
  # [OK] Cap players per world; overflow is sent to the fallback world.
  max_players_per_world: 50
  fallback_world: world

  packet_spam_protection:            # [OK] anti-crash packet limiter
    enabled: true
    packet_limit: 1000
    # "kick" or "ban"
    action: "kick"
    action_reason: "§cYou're sending way too many packets! Trying to crash the server!?"

  chat_spam_protection:              # [OK]
    enabled: true
    max_messages_per_second: 6
    mute_duration_seconds: 5

# ----------------------------------------------------------
# Reactive performance controls (all spike-aware now)
# ----------------------------------------------------------
# Each listener below is only registered when its "enabled" is true, and the
# in-event work is near-zero until the server is actually lagging, so these
# stay cheap even with big farms / redstone / lava builds.
performance_controls:
  disable_redstone:                  # [OK]
    enabled: true
    # NOTE: currently NOT honored. Below the threshold ALL redstone is
    # disabled regardless of this value; kept false to match real behavior.
    clocks_only: false
    disable_below_tps: 12.0

  disable_falling_blocks:            # [OK] holds sand/gravel/concrete powder
    enabled: true
    disable_below_tps: 12.0

  disable_fluids:                    # [OK] freezes water/lava flow
    enabled: true
    disable_below_tps: 12.0

  disable_explosions:                # [OK] cancels explosions during lag
    enabled: true
    disable_below_tps: 10.0

  disable_ender_pearls:              # [OK]
    enabled: true
    disable_below_tps: 10.0

  disable_command_blocks:            # [OK]
    enabled: true
    disable_below_tps: 10.0

  decrease_tickspeed:                # [OK] lowers random tick speed under lag
    enabled: true
    decrease_below_tps: 15.0
    # Value to drop random tick speed to (vanilla: 3, most performant: 0)
    decrease_to: 0

# ----------------------------------------------------------
# Mob AI freeze  ->  [OFF] disabled in code
# ----------------------------------------------------------
mob_ai:
  disable_ai_when_no_players_nearby:
    # Inverted invulnerability logic + a per-mob proximity scan that cost
    # more than it saved. Hard-disabled at the plugin level; no effect.
    enabled: false
    radius: 32
    invulnerable: true

# ----------------------------------------------------------
# Chunk-loading throttle  ->  [OFF] disabled in code
# ----------------------------------------------------------
chunk_loading:
  throttle_on_fast_player_movement:
    # Force-unloaded chunks the engine was actively loading, fighting the
    # server. Hard-disabled at the plugin level; no effect.
    enabled: false
    disable_duration_seconds: 5
    max_chunks_per_second: 500

# ----------------------------------------------------------
# In-game profiler bossbar (/lesslag profiler)  ->  [OK]
# ----------------------------------------------------------
profiler:
  enabled: true
  update_interval_ticks: 20
  show_cpu_usage: true
  show_ram_usage: true
  # Counts packets via ProtocolLib. Shown only to bossbar viewers.
  show_packets: true

# ----------------------------------------------------------
# Explosion queue  ->  [OK] spreads explosions across ticks
# ----------------------------------------------------------
explosion_queue:
  enabled: true
  explosions_per_tick: 5
  # Low TPS = fewer explosions per tick, and vice versa.
  dynamic_scaling: true
  low_tps_only:
    # When true, only queue while lagging (uses the spike-aware signal).
    enabled: true
    tps_below: 15.0
  queue_types:
    tnt: true
    creeper: true
    end_crystal: false
    bed: true
    respawn_anchor: true
    ghast_fireball: false
    wither_skull: false
  bypass_worlds:
    - pvp_world
    - practice
  limits:
    max_queue_size: 500
    cancel_new_explosions_when_full: true

# ==========================================================
#  WEB / REPORTING / HISTORY  ->  [TODO] not implemented yet
#  These sections are read by NO code and currently have no effect. They are
#  kept as a spec for future work. web_interface pages are static
#  placeholders and SSL is unimplemented, so it is shipped OFF.
# ==========================================================
web_interface:
  enabled: false                     # [TODO] placeholder pages only
  host: "0.0.0.0"
  port: 25580
  authentication:
    enabled: false
    username: admin
    password: changeme               # change if you ever enable this
  ssl:
    enabled: false
  session_timeout_minutes: 60
  generate_access_links: true
  access_link_expiration_minutes: 30

lag_reports:                         # [TODO] no code reads this
  enabled: false
  trigger:
    tps_below: 15.0
    duration_seconds: 15
  cooldown_minutes: 10
  notifications:
    chat_message: true
    action_bar: false
    permission: lesslag.admin
  storage:
    save_reports: true
    retention_days: 180
  analysis:
    entity_count: true
    dropped_items: true
    chunk_loads: true
    plugin_tasks: true
    villagers: true
    hoppers: true
    redstone: true
    loaded_worlds_count: true
    recent_player_commands: true

task_profiler:                       # [TODO] no code reads this
  enabled: false
  sampling:
    interval_ticks: 1
  tracking:
    sync_tasks: true
    async_tasks: true
  data:
    retain_sessions: 25
  alerts:
    enabled: true
    warning_ms_per_tick: 5.0

performance_history:                 # [TODO] no code reads this
  enabled: false
  collection_interval_minutes: 2
  retention_days: 180
  database:
    type: sqlite
    file: performance.db
  metrics:
    tps: true
    mspt: true
    cpu_usage: true
    ram_usage: true
    online_players: true
    loaded_chunks: true
    loaded_entities: true
    dropped_items: true
    villager_count: true
    mob_count: true
